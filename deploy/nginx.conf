upstream daphne {
    server 127.0.0.1:8001;
}

server {
    listen 80;
    server_name recrutepro.ci www.recrutepro.ci;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name recrutepro.ci www.recrutepro.ci;

    # ── Certificats SSL (Let's Encrypt) ──────────────────────────
    ssl_certificate     /etc/letsencrypt/live/recrutepro.ci/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/recrutepro.ci/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;

    client_max_body_size 20M;

    # ── Fichiers statiques (collectstatic) ───────────────────────
    location /static/ {
        alias /home/deploy/recrutement/staticfiles/;
        expires 30d;
        access_log off;
    }

    # ── Fichiers media (uploads) ─────────────────────────────────
    location /media/ {
        alias /home/deploy/recrutement/media/;
        expires 7d;
        access_log off;
    }

    # ── SSE (notifications temps reel) ───────────────────────────
    location /candidat/notifications/stream/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    location /entreprise/notifications/stream/ {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Connection '';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400s;
    }

    # ── Application Django (Daphne ASGI) ─────────────────────────
    location / {
        proxy_pass http://daphne;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
