{% load i18n langue_tags %}
{% get_current_language as CURRENT_LANG %}
{% get_available_languages as LANGUAGES %}
{% chemin_sans_langue as next_path %}

<div class="relative" x-data="{ open: false }" @click.outside="open = false">

    <button @click="open = !open"
            class="flex items-center gap-1.5 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-semibold px-3 py-1.5 rounded-lg border border-gray-200 transition">
        <span>
            {% if CURRENT_LANG == 'fr' %}🇫🇷
            {% elif CURRENT_LANG == 'en' %}🇬🇧
            {% elif CURRENT_LANG == 'es' %}🇪🇸
            {% elif CURRENT_LANG == 'ar' %}🇸🇦
            {% elif CURRENT_LANG == 'pt' %}🇵🇹
            {% elif CURRENT_LANG == 'de' %}🇩🇪
            {% elif CURRENT_LANG == 'it' %}🇮🇹

            {% else %}🌐{% endif %}
        </span>
        <span class="uppercase">{{ CURRENT_LANG }}</span>
        <svg class="w-3 h-3 transition-transform" :class="open ? 'rotate-180' : ''"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
        </svg>
    </button>

    <div x-show="open"
         x-transition:enter="transition ease-out duration-150"
         x-transition:enter-start="opacity-0 scale-95"
         x-transition:enter-end="opacity-100 scale-100"
         x-transition:leave="transition ease-in duration-100"
         x-transition:leave-start="opacity-100 scale-100"
         x-transition:leave-end="opacity-0 scale-95"
         class="absolute right-0 mt-2 w-44 bg-white rounded-xl shadow-xl border border-gray-100 overflow-hidden z-50"
         style="display:none;">
        <div class="py-1">
            {% for lang_code, lang_name in LANGUAGES %}
            <form action="{% url 'set_language' %}" method="post" class="block">
                {% csrf_token %}
                <input type="hidden" name="language" value="{{ lang_code }}">
                <input type="hidden" name="next" value="{{ next_path }}">
                <button type="submit"
                        class="w-full flex items-center gap-3 px-4 py-2.5 text-sm text-left hover:bg-gray-50 transition
                               {% if lang_code == CURRENT_LANG %}font-bold{% else %}text-gray-700{% endif %}">
                    <span class="text-lg">
                        {% if lang_code == 'fr' %}🇫🇷
                        {% elif lang_code == 'en' %}🇬🇧
                        {% elif lang_code == 'es' %}🇪🇸
                        {% elif lang_code == 'ar' %}🇸🇦
                        {% elif lang_code == 'pt' %}🇵🇹
                        {% elif lang_code == 'de' %}🇩🇪
                        {% elif lang_code == 'it' %}🇮🇹

                        {% else %}🌐{% endif %}
                    </span>
                    <span>{{ lang_name }}</span>
                    {% if lang_code == CURRENT_LANG %}
                    <span class="ml-auto text-xs" style="color:#009A44;">✓</span>
                    {% endif %}
                </button>
            </form>
            {% endfor %}
        </div>
    </div>
</div>
