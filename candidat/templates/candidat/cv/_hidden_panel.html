{% load i18n %}
{% comment %}
Panneau "Items masqués sur ce CV" — distinct du panneau Suggestions.
Items présents dans le CV avec visible:false. Restaurables.
Paramètres : section (str clé cv), titre (str)
{% endcomment %}
<div x-show="hasHidden('{{ section }}')"
     x-transition.duration.150ms
     class="rounded-xl border border-gray-200 bg-gray-50 p-2.5 mb-2">
  <div class="flex items-center justify-between gap-2 mb-1.5">
    <div class="flex items-center gap-1.5 min-w-0">
      <svg class="w-3.5 h-3.5 text-gray-500 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
      </svg>
      <p class="text-xs font-bold text-gray-600 truncate">
        {{ titre }}
        <span class="font-normal text-gray-400"
              x-text="'(' + hiddenCount('{{ section }}') + ')'"></span>
      </p>
    </div>
    <button type="button" @click="restoreAllHidden('{{ section }}')"
            class="px-2 py-1 rounded-md text-[11px] font-semibold bg-white border border-gray-300 text-gray-600 hover:bg-gray-100 transition flex-shrink-0">
      Tout restaurer
    </button>
  </div>
  <div class="space-y-1.5">
    <template x-for="h in hiddenItems('{{ section }}')" :key="'hidden-{{ section }}-' + h.idx">
      <div class="flex items-center gap-2 bg-white rounded-lg border border-gray-200 px-2 py-1.5">
        <span class="flex-1 text-xs text-gray-500 truncate italic"
              x-text="suggestionLabel('{{ section }}', h.item)"></span>
        <button type="button" @click="restoreHidden('{{ section }}', h.idx)"
                title="{% trans "Restaurer cet élément" %}"
                class="flex-shrink-0 px-2 py-0.5 rounded-md text-[11px] font-semibold bg-gray-600 text-white hover:bg-gray-700 transition">
          Restaurer
        </button>
      </div>
    </template>
  </div>
</div>
